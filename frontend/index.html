<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenNovel MVP</title>
    <link rel="stylesheet" href="/frontend/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="story-panel">
        <header class="story-header">
          <div>
            <p class="eyebrow">OpenNovel</p>
            <h1>Blood In The Rain</h1>
          </div>
          <div class="header-actions">
            <input
              id="gemini-key"
              type="password"
              autocomplete="off"
              placeholder="Gemini API Key"
            />
            <button id="start-button" class="ghost">새 세션 시작</button>
          </div>
        </header>
        <div id="log" class="log"></div>
        <div id="choices" class="choices"></div>
        <form id="input-form" class="input-row">
          <input id="input" name="input" autocomplete="off" placeholder="행동을 입력하세요" />
          <button type="submit">전송</button>
        </form>
      </section>
      <aside class="side-panel">
        <section class="state-panel">
          <p class="eyebrow">State</p>
          <div id="state"></div>
        </section>
        <section class="graph-panel">
          <div class="panel-head">
            <div>
              <p class="eyebrow">Story Graph</p>
              <h2>턴 흐름도</h2>
            </div>
            <p id="graph-mode" class="panel-meta">Debug logs off</p>
          </div>
          <div class="graph-frame">
            <div id="graph" class="graph"></div>
            <aside id="graph-hover" class="graph-hover hidden"></aside>
          </div>
        </section>
        <section class="detail-panel">
          <div class="panel-head">
            <div>
              <p class="eyebrow">Turn Detail</p>
              <h2>선택한 노드</h2>
            </div>
          </div>
          <div id="turn-detail" class="turn-detail empty">
            노드를 클릭하면 해당 턴의 입력, 결과, 서술이 표시됩니다.
          </div>
        </section>
      </aside>
    </main>
    <script src="/frontend/app.js"></script>
  </body>
</html>
